        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.DeleteUserResponse'
      tags:
      - admin
    get:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
