definitions:
  admin.CreateUserRequest:
    properties:
      email:
        maxLength: 255
        type: string
      is_admin:
        type: boolean
      nickname:
        maxLength: 100
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  admin.CreateUserResponse:
    properties:
      data:
        $ref: '#/definitions/auth.UserInfo'
      error_msg:
        type: string
    type: object
  admin.DeleteUserResponse:
    properties:
      data: {}
      error_msg:
        type: string
    type: object
  admin.GetUserResponse:
    properties:
      data:
        $ref: '#/definitions/auth.UserInfo'
      error_msg:
        type: string
    type: object
  admin.ListUsersResponse:
    properties:
      data:
        properties:
          total:
            type: integer
          users:
            items:
              $ref: '#/definitions/auth.UserInfo'
            type: array
        type: object
      error_msg:
        type: string
    type: object
  admin.UpdateUserRequest:
    properties:
      email:
        maxLength: 255
        type: string
      is_active:
        type: boolean
      is_admin:
        type: boolean
      nickname:
        maxLength: 100
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
    type: object
  admin.UpdateUserResponse:
    properties:
      data:
        $ref: '#/definitions/auth.UserInfo'
      error_msg:
        type: string
    type: object
  agent.ErrorResponse:
    properties:
      error_msg:
        type: string
    type: object
  audit.AuditDetails:
    additionalProperties: true
    type: object
  audit.AuditLogInfo:
    properties:
      action:
        type: string
      created_at:
        type: string
      details:
        $ref: '#/definitions/audit.AuditDetails'
      id:
        type: integer
      ip_address:
        type: string
      resource_id:
        type: string
      resource_name:
        type: string
      resource_type:
        type: string
      trigger:
        description: '"auto" | "manual" | ""'
        type: string
      user_agent:
        type: string
      user_id:
        type: integer
      username:
        type: string
    type: object
  audit.CommandLogInfo:
    properties:
      agent_id:
        type: string
      command_id:
        type: string
      command_type:
        type: string
      created_at:
        type: string
      created_by:
        type: integer
      error:
        type: string
      finished_at:
        type: string
      host_id:
        type: integer
      id:
        type: integer
      output:
        type: string
      parameters:
        $ref: '#/definitions/audit.CommandParameters'
      progress:
        type: integer
      started_at:
        type: string
      status:
        $ref: '#/definitions/audit.CommandStatus'
    type: object
  audit.CommandParameters:
    additionalProperties: true
    type: object
  audit.CommandStatus:
    enum:
    - pending
    - running
    - success
    - failed
    - cancelled
    type: string
    x-enum-varnames:
    - CommandStatusPending
    - CommandStatusRunning
    - CommandStatusSuccess
    - CommandStatusFailed
    - CommandStatusCancelled
  audit.GetAuditLogResponse:
    properties:
      data:
        $ref: '#/definitions/audit.AuditLogInfo'
      error_msg:
        type: string
    type: object
  audit.GetCommandLogResponse:
    properties:
      data:
        $ref: '#/definitions/audit.CommandLogInfo'
      error_msg:
        type: string
    type: object
  audit.ListAuditLogsResponse:
    properties:
      data:
        properties:
          logs:
            items:
              $ref: '#/definitions/audit.AuditLogInfo'
            type: array
          total:
            type: integer
        type: object
      error_msg:
        type: string
    type: object
  audit.ListCommandLogsResponse:
    properties:
      data:
        properties:
          commands:
            items:
              $ref: '#/definitions/audit.CommandLogInfo'
            type: array
          total:
            type: integer
        type: object
      error_msg:
        type: string
    type: object
  auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  auth.LoginResponse:
    properties:
      data: {}
      error_msg:
        type: string
    type: object
  auth.LogoutResponse:
    properties:
      data: {}
      error_msg:
        type: string
    type: object
  auth.UpdateProfileRequest:
    properties:
      email:
        maxLength: 255
        type: string
      language:
        enum:
        - zh
        - en
        type: string
    type: object
  auth.UpdateProfileResponse:
    properties:
      data:
        $ref: '#/definitions/auth.UserInfo'
      error_msg:
        type: string
    type: object
  auth.UserInfo:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      is_admin:
        type: boolean
      language:
        type: string
      last_login_at:
        type: string
      nickname:
        type: string
      username:
        type: string
    type: object
  auth.UserInfoResponse:
    properties:
      data:
        $ref: '#/definitions/auth.UserInfo'
      error_msg:
        type: string
    type: object
  cluster.AddNodeRequest:
    properties:
      api_port:
        description: REST API port (Master only, optional) / REST API 端口（仅 Master，可选）
        type: integer
      hazelcast_port:
        description: |-
          Port configuration based on node role / 基于节点角色的端口配置
          Master: hazelcast_port (default 5801) + api_port (default 8080, optional)
          Worker: hazelcast_port (default 5802)
          Hybrid: hazelcast_port (5801) + worker_port (5802)
        type: integer
      host_id:
        type: integer
      install_dir:
        description: SeaTunnel installation directory / SeaTunnel 安装目录
        type: string
      overrides:
        allOf:
        - $ref: '#/definitions/cluster.NodeOverrides'
        description: Node-level JSON overrides / 节点级 JSON 覆盖配置
      role:
        $ref: '#/definitions/cluster.NodeRole'
      skip_precheck:
        description: Whether to skip precheck / 是否跳过预检查
        type: boolean
      worker_port:
        description: Worker hazelcast port (Hybrid only) / Worker Hazelcast 端口（仅混合模式）
        type: integer
    required:
    - host_id
    - role
    type: object
  cluster.AddNodeResponse:
    properties:
      data:
        $ref: '#/definitions/cluster.NodeInfo'
      error_msg:
        type: string
    type: object
  cluster.ClusterConfig:
    additionalProperties: true
    type: object
  cluster.ClusterInfo:
    properties:
      config:
        $ref: '#/definitions/cluster.ClusterConfig'
      created_at:
        type: string
      deployment_mode:
        $ref: '#/definitions/cluster.DeploymentMode'
      description:
        type: string
      health_status:
        description: healthy, unhealthy, unknown / 健康状态
        type: string
      id:
        type: integer
      install_dir:
        type: string
      name:
        type: string
      node_count:
        type: integer
      online_nodes:
        description: number of nodes whose host is online / 主机在线的节点数
        type: integer
      status:
        $ref: '#/definitions/cluster.ClusterStatus'
      updated_at:
        type: string
      version:
        type: string
    type: object
  cluster.ClusterOperationResponse:
    properties:
      data:
        $ref: '#/definitions/cluster.OperationResult'
      error_msg:
        type: string
    type: object
  cluster.ClusterStatus:
    enum:
    - created
    - deploying
    - running
    - stopped
    - error
    type: string
    x-enum-varnames:
    - ClusterStatusCreated
    - ClusterStatusDeploying
    - ClusterStatusRunning
    - ClusterStatusStopped
    - ClusterStatusError
  cluster.ClusterStatusInfo:
    properties:
      cluster_id:
        type: integer
      cluster_name:
        type: string
      health_status:
        $ref: '#/definitions/cluster.HealthStatus'
      nodes:
        items:
          $ref: '#/definitions/cluster.NodeStatusInfo'
        type: array
      offline_nodes:
        type: integer
      online_nodes:
        type: integer
      status:
        $ref: '#/definitions/cluster.ClusterStatus'
      total_nodes:
        type: integer
    type: object
  cluster.CreateClusterRequest:
    properties:
      config:
        $ref: '#/definitions/cluster.ClusterConfig'
      deployment_mode:
        $ref: '#/definitions/cluster.DeploymentMode'
      description:
        type: string
      install_dir:
        type: string
      name:
        maxLength: 100
        type: string
      nodes:
        description: |-
          Nodes to auto-create from discovery (optional)
          从发现自动创建的节点（可选）
        items:
          $ref: '#/definitions/cluster.CreateNodeFromDiscovery'
        type: array
      version:
        type: string
    required:
    - deployment_mode
    - name
    - version
    type: object
  cluster.CreateClusterResponse:
    properties:
      data:
        $ref: '#/definitions/cluster.ClusterInfo'
      error_msg:
        type: string
    type: object
  cluster.CreateNodeFromDiscovery:
    properties:
      api_port:
        description: REST API port (optional) / REST API 端口（可选）
        type: integer
      hazelcast_port:
        description: Hazelcast cluster port (optional) / Hazelcast 集群端口（可选）
        type: integer
      host_id:
        description: Host ID / 主机 ID
        type: integer
      install_dir:
        description: SeaTunnel installation directory / SeaTunnel 安装目录
        type: string
      role:
        description: 'Node role: master, worker, hybrid / 节点角色'
        type: string
    type: object
  cluster.DeleteClusterResponse:
    properties:
      data: {}
      error_msg:
        type: string
    type: object
  cluster.DeploymentMode:
    enum:
    - hybrid
    - separated
    type: string
    x-enum-varnames:
    - DeploymentModeHybrid
    - DeploymentModeSeparated
  cluster.GetClusterResponse:
    properties:
      data:
        $ref: '#/definitions/cluster.ClusterInfo'
      error_msg:
        type: string
    type: object
  cluster.GetClusterStatusResponse:
    properties:
      data:
        $ref: '#/definitions/cluster.ClusterStatusInfo'
      error_msg:
        type: string
    type: object
  cluster.GetNodesResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/cluster.NodeInfo'
        type: array
      error_msg:
        type: string
    type: object
  cluster.HealthStatus:
    enum:
    - healthy
    - unhealthy
    - unknown
    type: string
    x-enum-varnames:
    - HealthStatusHealthy
    - HealthStatusUnhealthy
    - HealthStatusUnknown
  cluster.ListClustersResponse:
    properties:
      data:
        properties:
          clusters:
            items:
              $ref: '#/definitions/cluster.ClusterInfo'
            type: array
          total:
            type: integer
        type: object
      error_msg:
        type: string
    type: object
  cluster.NodeInfo:
    properties:
      api_port:
        description: REST API port (Master only) / REST API 端口（仅 Master）
        type: integer
      cluster_id:
        type: integer
      created_at:
        type: string
      hazelcast_port:
        description: Hazelcast cluster port / Hazelcast 集群端口
        type: integer
      host_id:
        type: integer
      host_ip:
        type: string
      host_name:
        type: string
      id:
        type: integer
      install_dir:
        description: SeaTunnel installation directory / SeaTunnel 安装目录
        type: string
      is_online:
        description: Whether host is online; when false, status may be shown as offline
          / 主机是否在线
        type: boolean
      overrides:
        allOf:
        - $ref: '#/definitions/cluster.NodeOverrides'
        description: Node-level JSON overrides / 节点级 JSON 覆盖配置
      process_pid:
        description: SeaTunnel process PID / SeaTunnel 进程 PID
        type: integer
      role:
        $ref: '#/definitions/cluster.NodeRole'
      status:
        allOf:
        - $ref: '#/definitions/cluster.NodeStatus'
        description: 'Unified status: pending, installing, running, stopped, error,
          offline / 统一状态'
      updated_at:
        type: string
      worker_port:
        description: Worker hazelcast port (Hybrid only) / Worker Hazelcast 端口（仅混合模式）
        type: integer
    type: object
  cluster.NodeJVMOverrides:
    properties:
      hybrid_heap_size:
        type: integer
      master_heap_size:
        type: integer
      worker_heap_size:
        type: integer
    type: object
  cluster.NodeOperationResult:
    properties:
      host_id:
        type: integer
      host_name:
        type: string
      message:
        type: string
      node_id:
        type: integer
      success:
        type: boolean
    type: object
  cluster.NodeOverrides:
    properties:
      jvm:
        $ref: '#/definitions/cluster.NodeJVMOverrides'
    type: object
  cluster.NodeRole:
    enum:
    - master
    - worker
    - master/worker
    type: string
    x-enum-varnames:
    - NodeRoleMaster
    - NodeRoleWorker
    - NodeRoleMasterWorker
  cluster.NodeStatus:
    enum:
    - pending
    - installing
    - running
    - stopped
    - error
    - offline
    type: string
    x-enum-varnames:
    - NodeStatusPending
    - NodeStatusInstalling
    - NodeStatusRunning
    - NodeStatusStopped
    - NodeStatusError
    - NodeStatusOffline
  cluster.NodeStatusInfo:
    properties:
      host_id:
        type: integer
      host_ip:
        type: string
      host_name:
        type: string
      is_online:
        description: Whether host is online / 主机是否在线
        type: boolean
      node_id:
        type: integer
      process_pid:
        description: SeaTunnel process PID / SeaTunnel 进程 PID
        type: integer
      role:
        $ref: '#/definitions/cluster.NodeRole'
      status:
        allOf:
        - $ref: '#/definitions/cluster.NodeStatus'
        description: 'Unified status: pending, installing, running, stopped, error
          / 统一状态'
    type: object
  cluster.OperationResult:
    properties:
      cluster_id:
        type: integer
      message:
        type: string
      node_results:
        items:
          $ref: '#/definitions/cluster.NodeOperationResult'
        type: array
      operation:
        $ref: '#/definitions/cluster.OperationType'
      success:
        type: boolean
    type: object
  cluster.OperationType:
    enum:
    - start
    - stop
    - restart
    type: string
    x-enum-varnames:
    - OperationStart
    - OperationStop
    - OperationRestart
  cluster.PrecheckCheckItem:
    properties:
      message:
        description: Detail message / 详细信息
        type: string
      name:
        description: Check name / 检查名称
        type: string
      status:
        description: passed, failed, skipped / 通过、失败、跳过
        type: string
    type: object
  cluster.PrecheckNodeResponse:
    properties:
      data:
        $ref: '#/definitions/cluster.PrecheckResult'
      error_msg:
        type: string
    type: object
  cluster.PrecheckRequest:
    properties:
      api_port:
        type: integer
      hazelcast_port:
        type: integer
      host_id:
        type: integer
      install_dir:
        type: string
      role:
        $ref: '#/definitions/cluster.NodeRole'
      worker_port:
        type: integer
    required:
    - hazelcast_port
    - host_id
    - role
    type: object
  cluster.PrecheckResult:
    properties:
      checks:
        items:
          $ref: '#/definitions/cluster.PrecheckCheckItem'
        type: array
      message:
        type: string
      success:
        type: boolean
    type: object
  cluster.RemoveNodeResponse:
    properties:
      data: {}
      error_msg:
        type: string
    type: object
  cluster.UpdateClusterRequest:
    properties:
      config:
        $ref: '#/definitions/cluster.ClusterConfig'
      description:
        type: string
      install_dir:
        type: string
      name:
        type: string
      version:
        type: string
    type: object
  cluster.UpdateClusterResponse:
    properties:
      data:
        $ref: '#/definitions/cluster.ClusterInfo'
      error_msg:
        type: string
    type: object
  cluster.UpdateNodeRequest:
    properties:
      api_port:
        description: REST API port (Master only, optional) / REST API 端口（仅 Master，可选）
        type: integer
      hazelcast_port:
        description: Hazelcast cluster port / Hazelcast 集群端口
        type: integer
      install_dir:
        description: SeaTunnel installation directory / SeaTunnel 安装目录
        type: string
      overrides:
        allOf:
        - $ref: '#/definitions/cluster.NodeOverrides'
        description: Node-level JSON overrides / 节点级 JSON 覆盖配置
      worker_port:
        description: Worker hazelcast port (Hybrid only) / Worker Hazelcast 端口（仅混合模式）
        type: integer
    type: object
  config.InitClusterConfigsRequest:
    properties:
      host_id:
        type: integer
      install_dir:
        type: string
    required:
    - host_id
    - install_dir
    type: object
  config.PromoteConfigRequest:
    properties:
      comment:
        type: string
    type: object
  config.PushConfigRequest:
    properties:
      install_dir:
        type: string
    required:
    - install_dir
    type: object
  config.Response:
    properties:
      data: {}
      error_msg:
        type: string
    type: object
  config.RollbackConfigRequest:
    properties:
      comment:
        type: string
      version:
        type: integer
    required:
    - version
    type: object
  config.SyncConfigRequest:
    properties:
      comment:
        type: string
    type: object
  config.SyncTemplateToAllNodesRequest:
    properties:
      config_type:
        type: string
    required:
    - config_type
    type: object
  config.UpdateConfigRequest:
    properties:
      comment:
        type: string
      content:
        type: string
    required:
    - content
    type: object
  dashboard.ClusterSummary:
    properties:
      deployment_mode:
        type: string
      id:
        type: integer
      master_nodes:
        type: integer
      name:
        type: string
      online_nodes:
        description: number of nodes whose host is online
        type: integer
      running_nodes:
        description: nodes with status running AND host online
        type: integer
      status:
        description: DB status; display as "unhealthy" when running but 0 online
        type: string
      total_nodes:
        type: integer
      worker_nodes:
        type: integer
    type: object
  dashboard.DashboardDataResponse:
    properties:
      data: {}
      error_msg:
        type: string
    type: object
  dashboard.HostSummary:
    properties:
      agent_status:
        type: string
      id:
        type: integer
      ip_address:
        type: string
      is_online:
        type: boolean
      name:
        type: string
      node_count:
        type: integer
    type: object
  dashboard.OverviewData:
    properties:
      cluster_summaries:
        items:
          $ref: '#/definitions/dashboard.ClusterSummary'
        type: array
      host_summaries:
        items:
          $ref: '#/definitions/dashboard.HostSummary'
        type: array
      recent_activities:
        items:
          $ref: '#/definitions/dashboard.RecentActivity'
        type: array
      stats:
        $ref: '#/definitions/dashboard.OverviewStats'
    type: object
  dashboard.OverviewStats:
    properties:
      error_clusters:
        type: integer
      error_nodes:
        type: integer
      online_agents:
        type: integer
      online_hosts:
        type: integer
      running_clusters:
        type: integer
      running_nodes:
        type: integer
      stopped_clusters:
        type: integer
      stopped_nodes:
        type: integer
      total_agents:
        description: Agent statistics / Agent 统计
        type: integer
      total_clusters:
        description: Cluster statistics / 集群统计
        type: integer
      total_hosts:
        description: Host statistics / 主机统计
        type: integer
      total_nodes:
        description: Node statistics / 节点统计
        type: integer
    type: object
  dashboard.RecentActivity:
    properties:
      id:
        type: integer
      message:
        type: string
      timestamp:
        type: string
      type:
        description: success, warning, info, error
        type: string
    type: object
  deepwiki.DeepWikiError:
    properties:
      reason:
        type: string
      url:
        type: string
    type: object
  deepwiki.DeepWikiRequest:
    properties:
      max_depth:
        description: |-
          MaxDepth is the maximum depth of pages to crawl (default: 1)
          MaxDepth 是爬取页面的最大深度（默认：1）
        type: integer
      mode:
        description: |-
          Mode is the output mode: "aggregate" (single document) or "pages" (structured)
          Mode 是输出模式："aggregate"（单文档）或 "pages"（结构化）
        type: string
      query:
        description: |-
          Query is an optional search query to filter results
          Query 是可选的搜索查询，用于过滤结果
        type: string
      url:
        description: |-
          URL is the repository URL or path (e.g., "apache/seatunnel")
          URL 是仓库地址或路径（如 "apache/seatunnel"）
        type: string
    required:
    - url
    type: object
  deepwiki.DeepWikiResponse:
    properties:
      code:
        description: |-
          Code is the error code (only present on error)
          Code 是错误代码（仅在错误时存在）
        type: string
      data:
        description: |-
          Data contains the markdown content (aggregate mode) or page array (pages mode)
          Data 包含 markdown 内容（aggregate 模式）或页面数组（pages 模式）
      elapsed_ms:
        description: |-
          ElapsedMs is the time taken in milliseconds
          ElapsedMs 是耗时（毫秒）
        type: integer
      errors:
        description: |-
          Errors contains any errors encountered during fetching
          Errors 包含获取过程中遇到的错误
        items:
          $ref: '#/definitions/deepwiki.DeepWikiError'
        type: array
      message:
        description: |-
          Message is the error message (only present on error)
          Message 是错误消息（仅在错误时存在）
        type: string
      status:
        description: |-
          Status is the response status: "ok", "partial", or "error"
          Status 是响应状态："ok"、"partial" 或 "error"
        type: string
      total_bytes:
        description: |-
          TotalBytes is the total size of fetched content
          TotalBytes 是获取内容的总大小
        type: integer
      total_pages:
        description: |-
          TotalPages is the number of pages fetched
          TotalPages 是获取的页面数量
        type: integer
    type: object
  deepwiki.Response:
    properties:
      data: {}
      error:
        type: string
    type: object
  deepwiki.SearchRequest:
    properties:
      query:
        description: |-
          Query is the search query
          Query 是搜索查询
        type: string
      repo:
        description: |-
          Repo is the repository to search (default: "apache/seatunnel")
          Repo 是要搜索的仓库（默认："apache/seatunnel"）
        type: string
    required:
    - query
    type: object
  deepwiki.SearchResponse:
    properties:
      query:
        description: |-
          Query is the original search query
          Query 是原始搜索查询
        type: string
      results:
        description: |-
          Results contains the search results
          Results 包含搜索结果
        type: string
      source:
        description: |-
          Source indicates the data source
          Source 表示数据来源
        type: string
    type: object
  discovery.ConfirmDiscoveryRequest:
    properties:
